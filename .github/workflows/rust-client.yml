name: Rust client

# Enforces formatting (cargo fmt) and lint (cargo clippy -D warnings) and a
# build for the Rust agent library under clients/. Runs only when clients/ changes.
on:
  pull_request:
    paths:
      - "clients/**"
      - ".github/workflows/rust-client.yml"
      - ".github/steps/rust-setup/**"
  push:
    branches: [main]
    paths:
      - "clients/**"
      - ".github/workflows/rust-client.yml"
      - ".github/steps/rust-setup/**"

defaults:
  run:
    shell: bash

jobs:
  lint-build:
    name: lint + build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS covers the unix/macOS cfg paths; Windows covers the windows cfg paths.
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      OPENFRAME_VERSION: 0.0.0-dev
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Rust tools
        uses: ./.github/steps/rust-setup
        with:
          path: clients
          components: clippy,rustfmt
          shared-key: openframe-client-${{ matrix.os }}

      - name: Lint (cargo fmt --check + cargo clippy -D warnings)
        run: make -C clients lint

      - name: Build binary
        run: make -C clients build-bin
